<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --blue: #0a84ff;
        --green: #34c759;
        --purple: #8957e5;
      }

      * { box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 15px;
        margin: 0;
      }

      .app-title {
        font-size: 16px;
        font-weight: 800;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        font-size: 13px;
        font-weight: bold;
        text-align: center;
        color: #fff;
        background: var(--blue);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn:hover { filter: brightness(1.1); }
      .btn-ai { background: var(--purple); }
      .btn-outline { background: var(--bg); border: 1px solid var(--blue); color: var(--blue); }
      
      .btn-action { 
        display: inline-block;
        width: auto;
        padding: 4px 8px;
        font-size: 10px;
        margin-right: 5px;
        margin-top: 8px;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-action:hover { border-color: var(--blue); color: var(--blue); }

      #chat-history {
        height: 380px;
        overflow-y: auto;
        border: 1px solid var(--border);
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 12px;
        background: var(--panel);
        font-size: 13px;
        line-height: 1.5;
      }

      .msg-user { color: var(--blue); margin-bottom: 10px; font-weight: bold; padding-bottom: 5px; border-bottom: 1px solid rgba(139, 148, 158, 0.1); }
      .msg-bot { color: var(--green); margin-bottom: 20px; border-left: 2px solid var(--green); padding-left: 10px; white-space: pre-wrap; font-size: 12px; }

      input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        color: white;
        border-radius: 8px;
        font-size: 13px;
      }

      .status { font-size: 11px; color: var(--muted); margin-top: 10px; min-height: 15px; }

      .sync-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-top: 10px;
      }

      .config-status {
        margin-top: 8px;
        font-size: 11px;
        color: var(--text);
        line-height: 1.4;
      }

      .prompt-pill {
        display: inline-block;
        padding: 6px 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        font-size: 11px;
        color: var(--muted);
        margin: 4px 4px 0 0;
        cursor: pointer;
        transition: 0.2s;
      }

      .prompt-pill:hover {
        border-color: var(--blue);
        color: var(--blue);
      }

      hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
    </style>
  </head>

  <body>
    <div class="app-title">🏦 Danny Bank Intelligence</div>

    <div id="chat-history"></div>

    <div style="margin-bottom:15px;">
      <div style="font-size:10px; color:var(--muted); margin-bottom:8px; font-weight:bold; text-transform:uppercase; letter-spacing:0.5px;">Analytical Prompts</div>
      <div class="prompt-pill" onclick="usePrompt('Analyze my weekend leaks. Include categories, merchants, and examples.')">📊 Weekend</div>
      <div class="prompt-pill" onclick="usePrompt('What is my monthly spend breakdown for each past month? Include account and category breakdowns with examples.')">🗓️ Monthly</div>
      <div class="prompt-pill" onclick="usePrompt('Give me category breakdowns with merchant examples and transaction IDs.')">🧾 Category</div>
      <div class="prompt-pill" onclick="usePrompt('What is my real savings rate?')">💰 Rate</div>
      <div class="prompt-pill" onclick="usePrompt('What changed most in my latest month versus the prior month?')">📈 Drift</div>
      <div class="prompt-pill" onclick="usePrompt('Which merchants look recurring or subscription-like?')">🔁 Recurring</div>
      <div class="prompt-pill" onclick="usePrompt('Which transactions look unusual or worth reviewing?')">🚨 Anomalies</div>
      <div class="prompt-pill" onclick="usePrompt('Where can I cut $500 per month with the least lifestyle damage?')">✂️ Cut $500</div>
      <div class="prompt-pill" onclick="usePrompt('What are my biggest merchant concentration risks?')">🏪 Merchant Risk</div>
      <div class="prompt-pill" onclick="usePrompt('Which categories are driving most of my overspend and what should I do first?')">🎯 Overspend</div>
    </div>

    <input type="text" id="chatInput" placeholder="Ask about months, weekends, accounts, categories, or merchants..." onkeypress="if(event.key === 'Enter') sendMsg()">
    <button class="btn btn-ai" onclick="sendMsg()">Send</button>

    <div class="sync-card">
      <div style="font-weight:bold; color:var(--blue); font-size:12px;">🔒 Private Local Sync</div>
      <code style="display:block; background:#000; padding:5px; margin-top:5px; border-radius:4px; font-size:10px;">.venv/bin/python -m src.engine.main</code>
      <div id="configStatus" class="config-status">Checking Gemini configuration…</div>
    </div>

    <button class="btn" style="margin-top:15px;" onclick="refreshVisuals()">📈 Refresh Command Center</button>
    <div class="status" id="statusText">Ready</div>

    <script>
      window.onload = function() {
        loadHistory();
        loadConfigStatus();
      };

      function loadHistory() {
        google.script.run.withSuccessHandler(history => {
          clearChatUi_();
          if (history.length === 0) {
            appendBotMessage("Connected. Ask for monthly breakdowns, weekend leaks, category detail, or savings analysis.");
            return;
          }
          history.forEach(m => {
            appendUserMessage(m.user);
            appendBotMessage(m.bot);
          });
        }).getChatHistory();
      }

      function loadConfigStatus() {
        google.script.run.withSuccessHandler(status => {
          document.getElementById('configStatus').textContent = status;
        }).getGeminiConfigStatus();
      }

      function usePrompt(text) {
        document.getElementById('chatInput').value = text;
        sendMsg();
      }

      function appendUserMessage(msg) {
        const div = document.createElement('div');
        div.className = 'msg-user';
        div.textContent = 'You: ' + msg;
        document.getElementById('chat-history').appendChild(div);
      }

      function appendBotMessage(reply) {
        const history = document.getElementById('chat-history');
        const div = document.createElement('div');
        div.className = 'msg-bot';
        div.textContent = 'AI: ' + reply;
        
        // Action Buttons
        const bar = document.createElement('div');
        
        const copyBtn = createActionBtn('📋 Copy', () => {
          const el = document.createElement('textarea');
          el.value = reply; document.body.appendChild(el); el.select();
          document.execCommand('copy'); document.body.removeChild(el);
          setStatus('Copied!');
        });

        const logBtn = createActionBtn('💾 Log to Sheet', () => {
          logBtn.disabled = true;
          logBtn.textContent = 'Logging...';
          setStatus('Summarizing & Logging...');
          google.script.run
            .withSuccessHandler(sum => {
              google.script.run
                .withSuccessHandler(res => {
                  div.textContent += '\n\nSUMMARY:\n' + sum;
                  setStatus(res);
                  logBtn.textContent = 'Logged';
                })
                .withFailureHandler(error => {
                  setStatus('Log failed: ' + error.message);
                  logBtn.disabled = false;
                  logBtn.textContent = '💾 Log to Sheet';
                })
                .logInsightToSheet(reply, sum);
            })
            .withFailureHandler(error => {
              setStatus('Summary failed: ' + error.message);
              logBtn.disabled = false;
              logBtn.textContent = '💾 Log to Sheet';
            })
            .summarizeInsight(reply);
        });

        bar.appendChild(copyBtn);
        bar.appendChild(logBtn);
        div.appendChild(bar);
        history.appendChild(div);
        history.scrollTop = history.scrollHeight;
      }

      function createActionBtn(text, fn) {
        const b = document.createElement('button');
        b.className = 'btn-action';
        b.textContent = text;
        b.onclick = fn;
        return b;
      }

      function clearChatUi_() {
        document.getElementById('chat-history').innerHTML = '';
      }

      function setStatus(txt) { document.getElementById('statusText').textContent = txt; }

      function sendMsg() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        appendUserMessage(msg);
        const botDiv = document.createElement('div');
        botDiv.className = 'msg-bot';
        botDiv.textContent = 'AI: Thinking...';
        document.getElementById('chat-history').appendChild(botDiv);
        document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight;
        input.value = '';
        
        google.script.run.withSuccessHandler(reply => {
          botDiv.remove(); // Remove thinking
          appendBotMessage(reply);
          loadConfigStatus();
        }).withFailureHandler(error => {
          botDiv.remove();
          appendBotMessage('Request failed: ' + error.message);
          setStatus('AI request failed');
        }).chatWithData(msg);
      }

      function refreshVisuals() {
        setStatus('Updating Dashboard...');
        google.script.run.withSuccessHandler(message => {
          clearChatUi_();
          appendBotMessage("Connected. Ask for monthly breakdowns, weekend leaks, category detail, or savings analysis.");
          loadConfigStatus();
          setStatus(message || 'Dashboard Ready!');
        })
          .withFailureHandler(error => setStatus('Refresh failed: ' + error.message))
          .refreshVisuals();
      }
    </script>
  </body>
</html>
